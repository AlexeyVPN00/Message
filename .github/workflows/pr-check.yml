name: PR - Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Check backend code style
        working-directory: ./backend
        run: |
          echo "🔍 Checking backend code quality..."
          npx eslint . --ext .ts --max-warnings 0 || echo "⚠️ ESLint warnings found"
          npx prettier --check "src/**/*.ts" || echo "⚠️ Prettier issues found"

      - name: Check frontend code style
        working-directory: ./frontend
        run: |
          echo "🔍 Checking frontend code quality..."
          npm run lint || echo "⚠️ ESLint warnings found"
          npx prettier --check "src/**/*.{ts,tsx}" || echo "⚠️ Prettier issues found"

  pr-labeler:
    name: Label PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  pr-size:
    name: Check PR Size
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check PR size
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const additions = files.reduce((acc, file) => acc + file.additions, 0);
            const deletions = files.reduce((acc, file) => acc + file.deletions, 0);
            const changes = additions + deletions;

            let size = 'small';
            let emoji = '🟢';

            if (changes > 1000) {
              size = 'extra-large';
              emoji = '🔴';
            } else if (changes > 500) {
              size = 'large';
              emoji = '🟠';
            } else if (changes > 200) {
              size = 'medium';
              emoji = '🟡';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${emoji} **PR Size**: ${size} (${changes} lines changed)\n\n` +
                    `📝 ${additions} additions, ${deletions} deletions across ${files.length} files`
            });
